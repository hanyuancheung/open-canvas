name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (don't actually publish)
        required: true
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm cli:build

      - name: Determine if dry run
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @open-canvas/core
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ "${{ steps.mode.outputs.dry }}" = "true" ]; then
            pnpm publish --access public --no-git-checks --dry-run
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Publish @open-canvas/cli
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [ "${{ steps.mode.outputs.dry }}" = "true" ]; then
            pnpm publish --access public --no-git-checks --dry-run
          else
            pnpm publish --access public --no-git-checks
          fi

      - name: Create GitHub Release
        if: steps.mode.outputs.dry == 'false' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
