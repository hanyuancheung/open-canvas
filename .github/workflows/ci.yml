name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1) Lint + typecheck on the canonical OS only — fast feedback for PRs.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm check
      - run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────────────────
  # 2) Build + simulated npx flow on Linux & macOS.
  #    Reproduces the production install path users hit, intercepts every
  #    publish/runtime regression we fixed during 0.1.0 → 0.1.3 (see
  #    PUBLISHING.md "incident timeline" — packed tarball, pnpm 11 build
  #    approval, Vite virtual modules, inspector-tag, missing _gitignore, etc).
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: e2e (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false

      - name: Build core + cli
        run: pnpm cli:build

      - name: Pack tarballs
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/oc-pack"
          ( cd packages/core && pnpm pack --pack-destination "$RUNNER_TEMP/oc-pack" )
          ( cd packages/cli  && pnpm pack --pack-destination "$RUNNER_TEMP/oc-pack" )
          ls -la "$RUNNER_TEMP/oc-pack"
          CORE_TGZ=$(ls "$RUNNER_TEMP/oc-pack"/open-canvas-core-*.tgz | head -1)
          CLI_TGZ=$(ls  "$RUNNER_TEMP/oc-pack"/open-canvas-cli-*.tgz  | head -1)
          echo "core=$CORE_TGZ" >> "$GITHUB_OUTPUT"
          echo "cli=$CLI_TGZ"   >> "$GITHUB_OUTPUT"

      - name: Upload tarballs as artifact
        uses: actions/upload-artifact@v4
        if: matrix.node == '20'
        with:
          name: oc-tarballs-${{ matrix.os }}
          path: ${{ runner.temp }}/oc-pack/*.tgz
          retention-days: 7

      - name: Simulate `npx @open-canvas/cli init` against a clean workspace
        shell: bash
        env:
          CORE_TGZ: ${{ steps.pack.outputs.core }}
          CLI_TGZ:  ${{ steps.pack.outputs.cli }}
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/oc-e2e"
          rm -rf "$WORK" && mkdir -p "$WORK"
          cd "$WORK"

          echo "::group::npx init from local cli tarball"
          # npm 11+ refuses to exec a bare tarball path (treats it as a script and
          # bails with EACCES). Using a file:// URL forces npx to treat it as a
          # package spec, the same code path `npx @open-canvas/cli` would hit.
          npx --yes "file://$CLI_TGZ" init my-board
          echo "::endgroup::"

          cd my-board

          echo "::group::Verify symlink-materialization regressions"
          # The template ships with directories that were symlinks in git but must
          # arrive as real directories/files. npm pack silently drops symlinks, so
          # guard against their reintroduction.
          test -d .claude/skills || (echo '.claude/skills missing or not a directory' && exit 1)
          test -d .agents/skills || (echo '.agents/skills missing or not a directory' && exit 1)
          test "$(ls .claude/skills | wc -l | tr -d ' ')" = "5" || (echo 'expected 5 skills under .claude/skills' && exit 1)
          test "$(ls .agents/skills | wc -l | tr -d ' ')" = "5" || (echo 'expected 5 skills under .agents/skills' && exit 1)
          test -f CLAUDE.md && [ "$(head -c 12 CLAUDE.md)" = "# CLAUDE.md" ] || (echo 'CLAUDE.md missing or wrong content' && exit 1)
          echo "::endgroup::"

          echo "::group::Workspace files emitted by scaffolder"
          ls -la
          test -f .gitignore         || (echo 'missing .gitignore'         && exit 1)
          test -f .npmrc             || (echo 'missing .npmrc'             && exit 1)
          test -f pnpm-workspace.yaml|| (echo 'missing pnpm-workspace.yaml'&& exit 1)
          test -f package.json       || (echo 'missing package.json'       && exit 1)
          test -d boards/getting-started || (echo 'missing default board' && exit 1)
          test -d .claude/skills/create-board || (echo 'missing skill'    && exit 1)
          echo "::endgroup::"

          echo "::group::Rewrite @open-canvas/core dep to point at local tarball"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.dependencies['@open-canvas/core'] = 'file:' + process.env.CORE_TGZ;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            console.log('rewired core →', process.env.CORE_TGZ);
          "
          cat package.json
          echo "::endgroup::"

          echo "::group::pnpm install in scaffolded project"
          pnpm install
          echo "::endgroup::"

          echo "::group::Smoke-check installed core dist"
          test -f node_modules/@open-canvas/core/dist/runtime/index.js
          test -f node_modules/@open-canvas/core/dist/vite/index.js
          test -f node_modules/@open-canvas/core/bin.js
          # The vite plugin must declare optimizeDeps.exclude for virtual modules.
          grep -q '"@open-canvas/core/runtime"' node_modules/@open-canvas/core/dist/vite/index.js
          echo "::endgroup::"

      - name: Boot dev server and probe HTTP endpoints
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/oc-e2e/my-board"

          echo "::group::Start dev server"
          # Run dev in background; capture pid so we can clean up.
          nohup pnpm dev > /tmp/oc-dev.log 2>&1 &
          echo $! > /tmp/oc-dev.pid

          # Poll up to 30s for the server to come up.
          for i in {1..30}; do
            if curl -sf -o /dev/null http://localhost:5173/; then
              echo "dev server is live (after ${i}s)"
              break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              echo "dev server failed to start within 30s. Log:"
              cat /tmp/oc-dev.log
              exit 1
            fi
          done
          echo "::endgroup::"

          echo "::group::Probe SPA root"
          curl -sf -o /tmp/oc-idx.html -w 'HTTP %{http_code}, %{size_download}B\n' http://localhost:5173/
          grep -q 'oc-root' /tmp/oc-idx.html
          echo "::endgroup::"

          echo "::group::Probe virtual:open-canvas/boards"
          curl -sf -o /tmp/oc-boards.js 'http://localhost:5173/@id/__x00__virtual:open-canvas/boards'
          grep -q 'getting-started' /tmp/oc-boards.js
          echo "::endgroup::"

          echo "::group::Probe board source compile (regression guard for inspector-tag)"
          # 200 status alone isn't enough — Vite returns an HTML error page with 500 when
          # JSX transform fails. Verify both status and the data-oc-loc injection.
          STATUS=$(curl -s -o /tmp/oc-board.js -w '%{http_code}' 'http://localhost:5173/boards/getting-started/index.tsx')
          echo "board compile status: $STATUS"
          test "$STATUS" = "200"
          # Injection should appear at least 10 times for the default board.
          COUNT=$(grep -c 'data-oc-loc' /tmp/oc-board.js)
          echo "data-oc-loc tags injected: $COUNT"
          test "$COUNT" -ge 10
          # Closing tags must remain untouched (this caught the 0.1.1 regression).
          ! grep -E '</[[:space:]]+data-oc-loc' /tmp/oc-board.js
          echo "::endgroup::"

          echo "::group::Stop dev server"
          kill "$(cat /tmp/oc-dev.pid)" || true
          sleep 1
          echo "::endgroup::"
